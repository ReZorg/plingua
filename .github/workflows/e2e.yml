name: E2E Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential \
            flex \
            libfl-dev \
            bison \
            libboost-filesystem-dev \
            libboost-program-options-dev

      - name: Build (grammar + compiler + simulator)
        run: make grammar && make compiler && make simulator

      - name: Verify binaries
        run: |
          test -f bin/plingua && echo "plingua built OK"
          test -f bin/psim    && echo "psim built OK"

      # ─────────────────────────────────────────────────────────────────────
      # Unit tests – compile every standalone .pli example to every format
      # and verify that (a) plingua exits 0 and (b) the output file exists.
      # ─────────────────────────────────────────────────────────────────────
      - name: Unit tests – compile examples to all formats
        run: |
          set -euo pipefail
          PLINGUA="$GITHUB_WORKSPACE/bin/plingua"
          EXAMPLES="$GITHUB_WORKSPACE/examples"

          # Standalone entry-point .pli files (include their model via @include)
          PROGRAMS=(
            transition.pli
            graph.pli
            sat_cell_division0.pli
            sat_cell_division1.pli
            sat_cell_division2.pli
            sat_tissue_cell_division0.pli
            sat_tissue_cell_division1.pli
            sat_tissue_cell_separation.pli
            Avian_Scavengers.pli
            tritrophic.pli
            zebra_mussel.pli
            bearded_vulture_2_0.pli
            bv_model_bwmc12.pli
          )

          FORMATS=(json xml pli bin bin2)

          PASS=0
          FAIL=0

          for prog in "${PROGRAMS[@]}"; do
            for fmt in "${FORMATS[@]}"; do
              outfile="/tmp/${prog%.pli}.${fmt}"
              echo -n "  compile $prog -> $fmt ... "
              if "$PLINGUA" "$EXAMPLES/$prog" -o "$outfile" -f "$fmt" \
                   -I "$EXAMPLES" > /tmp/plingua_out.txt 2>&1; then
                if [ -s "$outfile" ]; then
                  echo "PASS"
                  PASS=$((PASS+1))
                else
                  echo "FAIL (empty output)"
                  cat /tmp/plingua_out.txt
                  FAIL=$((FAIL+1))
                fi
              else
                echo "FAIL (exit code $?)"
                cat /tmp/plingua_out.txt
                FAIL=$((FAIL+1))
              fi
            done
          done

          echo ""
          echo "Compilation unit tests: ${PASS} passed, ${FAIL} failed"
          [ "$FAIL" -eq 0 ] || exit 1

      # ─────────────────────────────────────────────────────────────────────
      # E2E simulation tests – run psim on each compiled binary for a fixed
      # number of deterministic steps and verify it exits 0.
      # ─────────────────────────────────────────────────────────────────────
      - name: E2E tests – run psim simulations
        run: |
          set -euo pipefail
          PLINGUA="$GITHUB_WORKSPACE/bin/plingua"
          PSIM="$GITHUB_WORKSPACE/bin/psim"
          EXAMPLES="$GITHUB_WORKSPACE/examples"

          # Programs known to be deterministic (safe for fixed-step tests).
          # Use a small step count so CI stays fast.
          PROGRAMS=(
            transition.pli
            graph.pli
            sat_cell_division0.pli
            sat_cell_division1.pli
            sat_cell_division2.pli
            sat_tissue_cell_division0.pli
            sat_tissue_cell_division1.pli
            sat_tissue_cell_separation.pli
          )

          STEPS=5
          PASS=0
          FAIL=0

          for prog in "${PROGRAMS[@]}"; do
            binfile="/tmp/${prog%.pli}.bin"

            # Compile to binary (fast, compact format for simulation)
            echo -n "  compile $prog -> bin ... "
            if ! "$PLINGUA" "$EXAMPLES/$prog" -o "$binfile" -f bin \
                  -I "$EXAMPLES" > /tmp/plingua_out.txt 2>&1; then
              echo "FAIL (compile error)"
              cat /tmp/plingua_out.txt
              FAIL=$((FAIL+1))
              continue
            fi
            echo "OK"

            # Run deterministic simulation
            simout="/tmp/${prog%.pli}_sim.json"
            echo -n "  psim  $prog  ($STEPS steps) ... "
            if "$PSIM" "$binfile" -s "$STEPS" -o "$simout" \
                 > /tmp/psim_out.txt 2>&1; then
              if [ -s "$simout" ]; then
                echo "PASS"
                PASS=$((PASS+1))
              else
                echo "FAIL (empty output)"
                cat /tmp/psim_out.txt
                FAIL=$((FAIL+1))
              fi
            else
              echo "FAIL (exit code $?)"
              cat /tmp/psim_out.txt
              FAIL=$((FAIL+1))
            fi
          done

          echo ""
          echo "E2E simulation tests: ${PASS} passed, ${FAIL} failed"
          [ "$FAIL" -eq 0 ] || exit 1

      # ─────────────────────────────────────────────────────────────────────
      # Probabilistic simulation tests – run psim with randomization on
      # the probabilistic examples to verify they complete without crashing.
      # Uses a fixed seed for reproducible CI runs.
      # Note: Avian_Scavengers uses inter-membrane communication rules that
      # are not yet supported by the simulator, so it is excluded.
      # ─────────────────────────────────────────────────────────────────────
      - name: E2E tests – run psim probabilistic simulations
        run: |
          set -euo pipefail
          PLINGUA="$GITHUB_WORKSPACE/bin/plingua"
          PSIM="$GITHUB_WORKSPACE/bin/psim"
          EXAMPLES="$GITHUB_WORKSPACE/examples"

          # Probabilistic examples that use supported rule types
          PROBABILISTIC=(
            tritrophic.pli
            zebra_mussel.pli
            bearded_vulture_2_0.pli
            bv_model_bwmc12.pli
          )

          STEPS=3
          # Arbitrary but consistent seed for reproducible CI runs. Any value works;
          # 42 is chosen as a conventional placeholder (ref: "Hitchhiker's Guide").
          SEED=42
          PASS=0
          FAIL=0

          for prog in "${PROBABILISTIC[@]}"; do
            binfile="/tmp/${prog%.pli}_prob.bin"

            echo -n "  compile $prog -> bin ... "
            if ! "$PLINGUA" "$EXAMPLES/$prog" -o "$binfile" -f bin \
                  -I "$EXAMPLES" > /tmp/plingua_out.txt 2>&1; then
              echo "FAIL (compile error)"
              cat /tmp/plingua_out.txt
              FAIL=$((FAIL+1))
              continue
            fi
            echo "OK"

            simout="/tmp/${prog%.pli}_prob_sim.json"
            echo -n "  psim  $prog  ($STEPS steps, randomized, seed=$SEED) ... "
            if "$PSIM" "$binfile" -s "$STEPS" -r --seed "$SEED" -o "$simout" \
                 > /tmp/psim_out.txt 2>&1; then
              if [ -s "$simout" ]; then
                echo "PASS"
                PASS=$((PASS+1))
              else
                echo "FAIL (empty output)"
                cat /tmp/psim_out.txt
                FAIL=$((FAIL+1))
              fi
            else
              echo "FAIL (exit code $?)"
              cat /tmp/psim_out.txt
              FAIL=$((FAIL+1))
            fi
          done

          echo ""
          echo "Probabilistic simulation tests: ${PASS} passed, ${FAIL} failed"
          [ "$FAIL" -eq 0 ] || exit 1

      # ─────────────────────────────────────────────────────────────────────
      # Round-trip tests – compile to JSON, then feed the JSON to psim,
      # verifying that both serialisation formats are interchangeable.
      # ─────────────────────────────────────────────────────────────────────
      - name: E2E tests – round-trip JSON / XML / portable-binary
        run: |
          set -euo pipefail
          PLINGUA="$GITHUB_WORKSPACE/bin/plingua"
          PSIM="$GITHUB_WORKSPACE/bin/psim"
          EXAMPLES="$GITHUB_WORKSPACE/examples"

          PROGRAMS=(transition.pli graph.pli sat_cell_division0.pli)
          ROUNDTRIP_FORMATS=(json xml bin2)
          STEPS=3

          PASS=0
          FAIL=0

          for prog in "${PROGRAMS[@]}"; do
            for fmt in "${ROUNDTRIP_FORMATS[@]}"; do
              outfile="/tmp/${prog%.pli}_rt.${fmt}"

              echo -n "  round-trip $prog via $fmt ... "
              if ! "$PLINGUA" "$EXAMPLES/$prog" -o "$outfile" -f "$fmt" \
                    -I "$EXAMPLES" > /tmp/plingua_out.txt 2>&1; then
                echo "FAIL (compile)"
                cat /tmp/plingua_out.txt
                FAIL=$((FAIL+1))
                continue
              fi

              simout="/tmp/${prog%.pli}_rt_${fmt}_sim.json"
              if "$PSIM" "$outfile" -s "$STEPS" -o "$simout" \
                   > /tmp/psim_out.txt 2>&1 && [ -s "$simout" ]; then
                echo "PASS"
                PASS=$((PASS+1))
              else
                echo "FAIL (sim)"
                cat /tmp/psim_out.txt
                FAIL=$((FAIL+1))
              fi
            done
          done

          echo ""
          echo "Round-trip tests: ${PASS} passed, ${FAIL} failed"
          [ "$FAIL" -eq 0 ] || exit 1

      # ─────────────────────────────────────────────────────────────────────
      # Probabilistic round-trip tests – compile all probabilistic models to
      # every serialisation format and re-simulate with --seed for reproducibility.
      # ─────────────────────────────────────────────────────────────────────
      - name: E2E tests – round-trip probabilistic models
        run: |
          set -euo pipefail
          PLINGUA="$GITHUB_WORKSPACE/bin/plingua"
          PSIM="$GITHUB_WORKSPACE/bin/psim"
          EXAMPLES="$GITHUB_WORKSPACE/examples"

          PROBABILISTIC=(
            Avian_Scavengers.pli
            tritrophic.pli
            zebra_mussel.pli
            bearded_vulture_2_0.pli
            bv_model_bwmc12.pli
          )
          ROUNDTRIP_FORMATS=(json xml bin2)
          STEPS=2

          PASS=0
          FAIL=0

          for prog in "${PROBABILISTIC[@]}"; do
            for fmt in "${ROUNDTRIP_FORMATS[@]}"; do
              outfile="/tmp/${prog%.pli}_prt.${fmt}"

              echo -n "  round-trip $prog via $fmt ... "
              if ! "$PLINGUA" "$EXAMPLES/$prog" -o "$outfile" -f "$fmt" \
                    -I "$EXAMPLES" > /tmp/plingua_out.txt 2>&1; then
                echo "FAIL (compile)"
                cat /tmp/plingua_out.txt
                FAIL=$((FAIL+1))
                continue
              fi

              simout="/tmp/${prog%.pli}_prt_${fmt}_sim.json"
              if "$PSIM" "$outfile" -s "$STEPS" -r --seed 42 -o "$simout" \
                   > /tmp/psim_out.txt 2>&1 && [ -s "$simout" ]; then
                echo "PASS"
                PASS=$((PASS+1))
              else
                echo "FAIL (sim)"
                cat /tmp/psim_out.txt
                FAIL=$((FAIL+1))
              fi
            done
          done

          echo ""
          echo "Probabilistic round-trip tests: ${PASS} passed, ${FAIL} failed"
          [ "$FAIL" -eq 0 ] || exit 1

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-outputs
          path: /tmp/*.json
          retention-days: 3
