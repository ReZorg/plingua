name: Build CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential \
            flex \
            bison \
            libboost-filesystem-dev \
            libboost-program-options-dev

      - name: Generate grammar (flex + bison)
        run: make grammar

      - name: Build plingua compiler
        run: make compiler

      - name: Build psim simulator
        run: make simulator

      - name: Verify binaries exist
        run: |
          test -f bin/plingua && echo "plingua OK"
          test -f bin/psim    && echo "psim OK"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plingua-binaries
          path: bin/
          retention-days: 7
